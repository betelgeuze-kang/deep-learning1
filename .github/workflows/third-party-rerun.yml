name: Third-party rerun return

on:
  workflow_dispatch:
    inputs:
      return_id:
        description: Return directory id
        required: false
        default: github_actions_return_001
      upload_artifact:
        description: Upload return bundle to GitHub artifact storage
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

permissions:
  contents: read

defaults:
  run:
    shell: bash

jobs:
  third-party-rerun:
    name: third-party-rerun-return-manual
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 45
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Toolchain preflight
        run: |
          set -euo pipefail
          bash --version
          python3 --version
          g++ --version
          git --version

      - name: Capture third-party rerun
        env:
          RETURN_ID_INPUT: ${{ inputs.return_id }}
        run: |
          set -euo pipefail
          if [[ -n "$RETURN_ID_INPUT" && ! "$RETURN_ID_INPUT" =~ ^[A-Za-z0-9._-]{1,80}$ ]]; then
            echo "return_id must match ^[A-Za-z0-9._-]{1,80}$" >&2
            exit 2
          fi
          if [[ "$RETURN_ID_INPUT" == *".."* ]]; then
            echo "return_id must not contain '..'" >&2
            exit 2
          fi
          RETURN_ID="${RETURN_ID_INPUT:-github_actions_return_${GITHUB_RUN_ID}}"
          RETURN_DIR="results/github_actions_third_party_rerun/${RETURN_ID}/third_party_return"
          mkdir -p "$RETURN_DIR"
          experiments/run_v22_clean_machine_execution_kit.sh >/dev/null
          results/v22_clean_machine_execution_kit/kit_001/clean_machine/CAPTURE_THIRD_PARTY_RERUN.sh "$RETURN_DIR"
          python3 - "$RETURN_DIR" <<'PY'
          import json
          import os
          import platform
          import sys
          from datetime import datetime, timezone
          from pathlib import Path

          return_dir = Path(sys.argv[1])
          identity = {
              "reviewer_name": "github-actions-self-hosted-runner",
              "reviewer_org": "GitHub Actions",
              "reviewer_contact": os.environ.get("GITHUB_SERVER_URL", "https://github.com"),
              "reviewer_kind": "automated-third-party-self-hosted-runner",
              "external_independent_reviewer": 0,
              "github_actor": os.environ.get("GITHUB_ACTOR", ""),
              "github_repository": os.environ.get("GITHUB_REPOSITORY", ""),
              "github_run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "github_run_attempt": os.environ.get("GITHUB_RUN_ATTEMPT", ""),
              "conflict_disclosure": "GitHub Actions self-hosted runner; automated reviewer, not a GitHub-hosted clean-room rerun.",
              "review_timestamp_utc": datetime.now(timezone.utc).isoformat(),
          }
          environment = {
              "clean_machine": 0,
              "external_independent_environment": 0,
              "workspace_cleanliness_verified": 0,
              "runner_ephemeral_verified": 0,
              "environment_kind": "github-actions-self-hosted-linux-x64",
              "os": platform.platform(),
              "kernel": platform.release(),
              "cpu": platform.processor() or platform.machine(),
              "python": sys.version,
              "git_revision": os.environ.get("GITHUB_SHA", ""),
              "github_repository": os.environ.get("GITHUB_REPOSITORY", ""),
              "github_ref": os.environ.get("GITHUB_REF", ""),
              "github_run_id": os.environ.get("GITHUB_RUN_ID", ""),
              "container_image_digest": "",
              "memory_gb": "",
              "storage": "",
              "compiler": "",
          }
          (return_dir / "reviewer_identity.json").write_text(json.dumps(identity, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          (return_dir / "rerun_environment.json").write_text(json.dumps(environment, indent=2, sort_keys=True) + "\n", encoding="utf-8")
          PY
          V18_THIRD_PARTY_RERUN_DIR="$RETURN_DIR" experiments/run_v18_external_evidence_intake.sh
          cat results/v18_external_evidence_intake_summary.csv
          cat results/v18_external_evidence_intake_decision.csv

      - name: Upload third-party return artifact
        if: ${{ inputs.upload_artifact == 'true' }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02
        with:
          name: third-party-rerun-return
          path: |
            results/github_actions_third_party_rerun/
            results/v18_external_evidence_intake_summary.csv
            results/v18_external_evidence_intake_decision.csv
          if-no-files-found: error
          retention-days: 1
