name: AI verify

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: ai-verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Untrusted pull-request code is verified only on an ephemeral GitHub-hosted
  # runner with a credential-free checkout. It never touches the persistent
  # self-hosted runner. This is intended to be the required status check on PRs.
  pr-safe-verify:
    name: pr-safe-verify
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - name: Checkout (no persisted credentials)
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          persist-credentials: false
          fetch-depth: 1
          clean: true

      - name: Toolchain preflight
        run: |
          set -euo pipefail
          bash --version
          python3 --version
          git --version

      - name: Clean-room static verification
        run: |
          set -euo pipefail
          # Evidence-independent checks that are safe on an ephemeral runner.
          # The full ./scripts/ai-verify.sh evidence suite depends on generated
          # results/ artifacts that exist only on the self-hosted runner, so it
          # runs in the ai-verify job below on trusted (non-PR) events.
          bash -n scripts/ai-verify.sh
          if [ -x tools/verify_ci_workflows.py ]; then
            tools/verify_ci_workflows.py .
          fi
          if [ -f schemas/typed_readiness.schema.json ]; then
            python3 -m json.tool schemas/typed_readiness.schema.json >/dev/null
          fi
          if [ -f readiness/typed_ready.json ]; then
            python3 -m json.tool readiness/typed_ready.json >/dev/null
            tools/verify_artifact.py typed-readiness readiness/typed_ready.json
          fi
          if [ -f pr_slices/pr2.json ]; then
            python3 -m json.tool pr_slices/pr2.json >/dev/null
            tools/verify_artifact.py pr-split pr_slices/pr2.json
          fi

      - name: Python reference smoke tests
        run: |
          set -euo pipefail
          # Auto-discover every scripts/test_*.py smoke so new tools are
          # CI-gated without editing this workflow. These must stay fast and
          # clean-room (no network, no GPU, no accumulated results/).
          shopt -s nullglob
          tests=(scripts/test_*.py)
          if [ ${#tests[@]} -eq 0 ]; then
            echo "no scripts/test_*.py found" >&2
            exit 1
          fi
          for test_file in "${tests[@]}"; do
            echo "==> $test_file"
            python3 "$test_file"
          done

      - name: C++ CPU build smoke
        run: |
          set -euo pipefail
          if [ -f CMakeLists.txt ]; then
            cmake -S . -B build -DDLE_ENABLE_HIP=OFF
            cmake --build build -j 2
            mkdir -p results
            if [ -x build/dmv01 ]; then
              build/dmv01 --N 32 --cycles 5 --seed 1 --csv results/ai_verify_v01_smoke.csv
              test -s results/ai_verify_v01_smoke.csv
            fi
            if [ -x build/dmv02 ]; then
              build/dmv02 --dataset counter --N 32 --epochs 1 --cycles-per-epoch 2 --seed 1 --csv results/ai_verify_v02_smoke.csv
              test -s results/ai_verify_v02_smoke.csv
            fi
          fi

  # Full evidence verification runs only on trusted (non-PR) events on the
  # persistent self-hosted runner, which carries the generated results/
  # artifacts that ./scripts/ai-verify.sh checks.
  ai-verify:
    name: ai-verify.sh
    if: github.event_name != 'pull_request'
    runs-on: [self-hosted, linux, x64]
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          fetch-depth: 1
          clean: true

      - name: Toolchain preflight
        run: |
          set -euo pipefail
          bash --version
          python3 --version
          cmake --version
          g++ --version
          git --version

      - name: Run ai-verify
        env:
          AI_VERIFY_JOBS: "2"
          DLE_VERIFY_ENABLE_HIP: "OFF"
        run: ./scripts/ai-verify.sh

  trusted-self-hosted-verify:
    name: trusted-self-hosted-ai-verify.sh
    if: github.event_name != 'pull_request'
    runs-on: [self-hosted, linux, x64]
    permissions:
      contents: read
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
          fetch-depth: 1
          clean: true

      - name: Toolchain preflight
        run: |
          set -euo pipefail
          bash --version
          python3 --version
          cmake --version
          g++ --version
          git --version

      - name: Run ai-verify
        env:
          AI_VERIFY_JOBS: "2"
          DLE_VERIFY_ENABLE_HIP: "OFF"
        run: ./scripts/ai-verify.sh
