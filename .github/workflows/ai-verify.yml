name: AI verify

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

defaults:
  run:
    shell: bash

concurrency:
  group: ai-verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ai-verify:
    name: ai-verify.sh
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Toolchain preflight
        run: |
          set -euo pipefail
          bash --version
          python3 --version
          cmake --version
          g++ --version
          git --version

      - name: Run ai-verify
        env:
          AI_VERIFY_JOBS: "2"
          DLE_VERIFY_ENABLE_HIP: "OFF"
        run: ./scripts/ai-verify.sh
