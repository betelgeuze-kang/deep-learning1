name: AI verify

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ai-verify-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ai-verify:
    name: ai-verify.sh
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            bash ca-certificates cmake coreutils findutils g++ git make python3 \
            sed grep diffutils time procps

      - name: Run ai-verify
        env:
          AI_VERIFY_JOBS: "2"
          DLE_VERIFY_ENABLE_HIP: "OFF"
        run: ./scripts/ai-verify.sh
